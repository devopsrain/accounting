{% extends "base.html" %}

{% block title %}Add Journal Entry{% endblock %}

{% block extra_css %}
<style>
    .entry-line { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; margin-bottom: 10px; }
    .totals-row { font-weight: 700; font-size: 1.1rem; }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2"><i class="bi bi-journal-plus"></i> Add Journal Entry</h1>
    <a href="{{ url_for('journal_entries.journal_list') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Back to List
    </a>
</div>

<div class="card">
    <div class="card-header"><h5 class="mb-0">Entry Details</h5></div>
    <div class="card-body">
        <form id="journalEntryForm">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Entry Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="entry_date" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Description <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="description" placeholder="Transaction description" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Reference #</label>
                    <input type="text" class="form-control" id="reference_number" placeholder="Optional">
                </div>
            </div>

            <h6 class="mt-4 mb-3">Entry Lines</h6>
            <div id="entryLines">
                <div class="entry-line row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Account Code</label>
                        <input type="text" class="form-control line-account" placeholder="e.g. 1000">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Account Name</label>
                        <input type="text" class="form-control line-name" placeholder="e.g. Cash">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Debit</label>
                        <input type="number" step="0.01" min="0" class="form-control line-debit" value="0" oninput="calcTotals()">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Credit</label>
                        <input type="number" step="0.01" min="0" class="form-control line-credit" value="0" oninput="calcTotals()">
                    </div>
                    <div class="col-md-2 text-end">
                        <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeLine(this)">
                            <i class="bi bi-trash"></i> Remove
                        </button>
                    </div>
                </div>
                <div class="entry-line row g-2 align-items-end">
                    <div class="col-md-3">
                        <input type="text" class="form-control line-account" placeholder="e.g. 4000">
                    </div>
                    <div class="col-md-3">
                        <input type="text" class="form-control line-name" placeholder="e.g. Sales Revenue">
                    </div>
                    <div class="col-md-2">
                        <input type="number" step="0.01" min="0" class="form-control line-debit" value="0" oninput="calcTotals()">
                    </div>
                    <div class="col-md-2">
                        <input type="number" step="0.01" min="0" class="form-control line-credit" value="0" oninput="calcTotals()">
                    </div>
                    <div class="col-md-2 text-end">
                        <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeLine(this)">
                            <i class="bi bi-trash"></i> Remove
                        </button>
                    </div>
                </div>
            </div>

            <button type="button" class="btn btn-outline-primary btn-sm mt-2" onclick="addLine()">
                <i class="bi bi-plus-lg"></i> Add Line
            </button>

            <!-- Totals -->
            <div class="row mt-4 totals-row">
                <div class="col-md-6 text-end">Totals:</div>
                <div class="col-md-2 text-end" id="totalDebit">0.00</div>
                <div class="col-md-2 text-end" id="totalCredit">0.00</div>
                <div class="col-md-2"></div>
            </div>
            <div class="text-center mt-2">
                <span id="balanceStatus" class="badge bg-secondary">Enter amounts</span>
            </div>

            <div class="d-flex justify-content-end mt-4">
                <button type="button" class="btn btn-primary" onclick="submitEntry()">
                    <i class="bi bi-check-lg"></i> Post Journal Entry
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Set today as default date
document.getElementById('entry_date').valueAsDate = new Date();

function addLine(){
    var container = document.getElementById('entryLines');
    var line = document.createElement('div');
    line.className = 'entry-line row g-2 align-items-end';
    line.innerHTML = '<div class="col-md-3"><input type="text" class="form-control line-account" placeholder="Account code"></div>' +
        '<div class="col-md-3"><input type="text" class="form-control line-name" placeholder="Account name"></div>' +
        '<div class="col-md-2"><input type="number" step="0.01" min="0" class="form-control line-debit" value="0" oninput="calcTotals()"></div>' +
        '<div class="col-md-2"><input type="number" step="0.01" min="0" class="form-control line-credit" value="0" oninput="calcTotals()"></div>' +
        '<div class="col-md-2 text-end"><button type="button" class="btn btn-outline-danger btn-sm" onclick="removeLine(this)"><i class="bi bi-trash"></i> Remove</button></div>';
    container.appendChild(line);
}

function removeLine(btn){
    var lines = document.querySelectorAll('.entry-line');
    if(lines.length > 2) { btn.closest('.entry-line').remove(); calcTotals(); }
}

function calcTotals(){
    var debits = 0, credits = 0;
    document.querySelectorAll('.line-debit').forEach(function(i){ debits += parseFloat(i.value)||0; });
    document.querySelectorAll('.line-credit').forEach(function(i){ credits += parseFloat(i.value)||0; });
    document.getElementById('totalDebit').textContent = debits.toFixed(2);
    document.getElementById('totalCredit').textContent = credits.toFixed(2);
    var badge = document.getElementById('balanceStatus');
    if(debits === 0 && credits === 0){ badge.className='badge bg-secondary'; badge.textContent='Enter amounts'; }
    else if(Math.abs(debits-credits)<0.01){ badge.className='badge bg-success'; badge.textContent='✓ Balanced'; }
    else { badge.className='badge bg-danger'; badge.textContent='Unbalanced (Diff: '+Math.abs(debits-credits).toFixed(2)+')'; }
}

function submitEntry(){
    var lines = [];
    document.querySelectorAll('.entry-line').forEach(function(row){
        var acct = row.querySelector('.line-account').value.trim();
        var name = row.querySelector('.line-name').value.trim();
        var debit = parseFloat(row.querySelector('.line-debit').value)||0;
        var credit = parseFloat(row.querySelector('.line-credit').value)||0;
        if(acct && (debit>0 || credit>0)){
            lines.push({account_code:acct, account_name:name, debit_amount:debit, credit_amount:credit});
        }
    });

    if(lines.length < 2){ alert('At least 2 lines required'); return; }

    var payload = {
        entry_date: document.getElementById('entry_date').value,
        description: document.getElementById('description').value,
        reference_number: document.getElementById('reference_number').value,
        company_id: 'default',
        lines: lines
    };

    fetch('{{ url_for("journal_entries.add_entry") }}', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
    }).then(r=>r.json()).then(data=>{
        if(data.success){
            window.location.href = '{{ url_for("journal_entries.journal_list") }}';
        } else {
            alert('Error: ' + (data.error || 'Unknown error'));
        }
    }).catch(err=>alert('Request failed: '+err));
}
</script>
{% endblock %}
