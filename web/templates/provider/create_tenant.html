{% extends "provider/base.html" %}
{% block title %}Create Tenant{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-building-add"></i> Register New Tenant</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-8">
                            <label class="form-label">Company Name <span class="text-danger">*</span></label>
                            <input type="text" name="company_name" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Subscription Tier</label>
                            <select name="subscription_tier" class="form-select">
                                {% for key, tier in tiers.items() %}
                                <option value="{{ key }}">{{ tier.display_name }} ({{ '{:,.0f}'.format(tier.price_monthly_etb) }} ETB/mo)</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Registration Number</label>
                            <input type="text" name="registration_number" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">TIN Number</label>
                            <input type="text" name="tin_number" class="form-control">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" name="address" class="form-control">
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">City</label>
                            <input type="text" name="city" class="form-control" value="Addis Ababa">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Business Type</label>
                            <input type="text" name="business_type" class="form-control"
                                   placeholder="e.g. Manufacturing, Retail, Services">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone</label>
                            <input type="text" name="phone" class="form-control" placeholder="+251-">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Notes</label>
                        <textarea name="notes" class="form-control" rows="2"></textarea>
                    </div>

                    <!-- Tier Feature Preview -->
                    <div class="card mb-3" style="background: var(--bg-card-header);">
                        <div class="card-body py-2">
                            <small class="text-muted">
                                <i class="bi bi-info-circle"></i>
                                Module licenses are automatically provisioned based on the selected tier.
                                You can customize individual modules after creation.
                            </small>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-accent">
                            <i class="bi bi-check-lg"></i> Create Tenant
                        </button>
                        <a href="{{ url_for('provider_admin.provider_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
