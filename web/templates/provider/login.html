{% extends "provider/base.html" %}
{% block title %}Provider Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0"><i class="bi bi-shield-lock-fill"></i> Provider Admin</h4>
                <small class="text-muted">SaaS Platform Management Console</small>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Provider Password</label>
                        <input type="password" name="password" class="form-control form-control-lg"
                               placeholder="Enter provider admin password" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-accent w-100 btn-lg">
                        <i class="bi bi-unlock-fill"></i> Access Console
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
