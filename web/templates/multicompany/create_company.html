{% extends "multicompany/base.html" %}

{% block title %}Create Company - Multi-Company Payroll Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-building-add"></i> Create New Company</h5>
            </div>
            <div class="card-body">
                <form id="createCompanyForm">
                    <div class="mb-3">
                        <label class="form-label">Company Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" required placeholder="e.g. Abyssinia Trading PLC">
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Registration Number</label>
                            <input type="text" class="form-control" id="registration_number" placeholder="Business reg. number">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">TIN Number</label>
                            <input type="text" class="form-control" id="tin_number" placeholder="Tax ID number">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" id="address" placeholder="Company address">
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" id="city" value="Addis Ababa">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Business Type</label>
                            <select class="form-select" id="business_type">
                                <option value="">Select type...</option>
                                <option value="Sole Proprietorship">Sole Proprietorship</option>
                                <option value="Partnership">Partnership</option>
                                <option value="Private Limited (PLC)">Private Limited (PLC)</option>
                                <option value="Share Company">Share Company</option>
                                <option value="NGO">NGO</option>
                                <option value="Government">Government</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="phone" placeholder="+251 ...">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="company@example.com">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Subscription Plan</label>
                        <select class="form-select" id="subscription_plan">
                            <option value="FREE" selected>Free (up to 5 employees)</option>
                            <option value="BASIC">Basic (up to 25 employees)</option>
                            <option value="PROFESSIONAL">Professional (up to 100 employees)</option>
                            <option value="ENTERPRISE">Enterprise (unlimited)</option>
                        </select>
                    </div>

                    <div id="alertBox" class="alert d-none"></div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('multicompany.select_company') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-building-add"></i> Create Company
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('createCompanyForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var alertBox = document.getElementById('alertBox');
    alertBox.classList.add('d-none');

    var data = {
        name: document.getElementById('name').value,
        registration_number: document.getElementById('registration_number').value,
        tin_number: document.getElementById('tin_number').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        business_type: document.getElementById('business_type').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        subscription_plan: document.getElementById('subscription_plan').value
    };

    fetch('{{ url_for("multicompany.create_company") }}', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(function(r) { return r.json(); })
    .then(function(resp) {
        if (resp.success) {
            alertBox.className = 'alert alert-success';
            alertBox.textContent = resp.message + ' Redirecting...';
            setTimeout(function() {
                window.location.href = '{{ url_for("multicompany.select_company") }}';
            }, 1500);
        } else {
            alertBox.className = 'alert alert-danger';
            alertBox.textContent = resp.error || 'Failed to create company';
        }
    })
    .catch(function(err) {
        alertBox.className = 'alert alert-danger';
        alertBox.textContent = 'Request failed: ' + err;
    });
});
</script>
{% endblock %}
