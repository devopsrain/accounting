[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers -ra
markers =
    unit: Unit tests (data stores, models, utilities)
    routes: HTTP route / endpoint tests
    auth: Authentication & authorization tests
    integration: Multi-module integration tests
    smoke: Quick smoke tests (route health checks)
    slow: Tests that take > 2 seconds
